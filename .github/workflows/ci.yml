name: CI

# PRs targeting main, plus the push that lands a merge. Restricting push to main
# avoids the double run a feature branch with an open PR would otherwise trigger.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; the check job widens it for test reporting.
permissions:
  contents: read

# Supersede stale runs of the same PR; main pushes (no head_ref) keep their run.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # The gate. Replays `make check` unchanged on the dev OS (ubuntu) and the 42
  # grading OS (debian trixie, pinned by digest). Both legs are the required check.
  check:
    name: check (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu
            os: ubuntu-24.04
          - label: trixie
            os: ubuntu-24.04
            container: debian:trixie@sha256:4ae67669760b807c19f23902a3fd7c121a6a70cf2ae709035674b23e712e4d62
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        # Same versioned set as provisioning/group_vars/all.yml. gcc-13/make are
        # preinstalled on the ubuntu runner; the trixie container needs them too.
        run: |
          SUDO=; [ "$(id -u)" -ne 0 ] && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends \
            build-essential gcc-13 make pkg-config \
            clang-format-19 clang-tidy-19 cppcheck valgrind gcovr bear \
            libcriterion-dev
      - name: Register problem matcher
        run: echo "::add-matcher::.github/matchers/compiler.json"
      - name: make check
        run: make check
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-${{ matrix.label }}
          path: reports/junit.xml
          if-no-files-found: warn
      - name: Publish test report
        # One summary is enough: only the ubuntu leg publishes the PR check.
        if: ${{ always() && !matrix.container }}
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: reports/junit.xml
          annotate_only: ${{ github.event.pull_request.head.repo.fork == true }}

  # Informative for now -- promoted to a required check once there is real code to
  # test (see DEFERRED.md). gcc-13 is preinstalled on the ubuntu runner.
  analyze:
    name: analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Register problem matcher
        run: echo "::add-matcher::.github/matchers/compiler.json"
      - name: make analyze
        run: make analyze

  # Informative for now (see DEFERRED.md). valgrind runs on a binary WITHOUT
  # capabilities -- it refuses a setcap'd executable.
  memcheck:
    name: memcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends valgrind
      - name: make memcheck
        run: make memcheck

  # Informative for now -- promoted to required at the sprint PR (DEFERRED.md
  # DD-006). Runs gcovr on the unit-test binary; the 90% floor lives in
  # `make coverage`. gcc-13/make are preinstalled on the ubuntu runner.
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-13 make gcovr libcriterion-dev pkg-config
      - name: make coverage
        run: make coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
